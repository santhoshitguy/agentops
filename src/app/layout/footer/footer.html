<footer class="bottom-bar">
    <div class="filter-group">
        @for (filter of agentFilters(); track filter.id) {
        <button class="filter-btn" [class.active]="filter.active" [style.--filter-color]="filter.color"
            (click)="toggleFilter(filter.id)">
            {{ filter.label }}
        </button>
        }
    </div>
    <div class="bar-actions">
        <span style="font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-disabled)">{{
            currentTimestamp() }}</span>
        <button class="action-btn">
            <svg width="14" height="14" viewBox="0 0 24 24">
                <path d="M4 4h16v16H4z" stroke="currentColor" stroke-width="2" fill="none" />
            </svg>
            Remote session
        </button>
    </div>
</footer>
